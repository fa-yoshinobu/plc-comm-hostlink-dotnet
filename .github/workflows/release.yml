name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 9.0.x }
      
      - name: Restore Dependencies
        run: dotnet restore
        
      - name: Build Core Library
        run: |
          # Try to find the core library specifically
          $csproj = Get-ChildItem -Path src -Filter "*.csproj" -Recurse | Select-Object -First 1
          Write-Host "Target Project: $($csproj.FullName)"
          dotnet build $($csproj.FullName) -c Release
          
      - name: Pack Core Library
        run: |
          mkdir out
          $csproj = Get-ChildItem -Path src -Filter "*.csproj" -Recurse | Select-Object -First 1
          dotnet pack $($csproj.FullName) -c Release --output out
          
      - name: List Output
        run: dir out
        
      - name: Create or Update GitHub Release
        shell: pwsh
        env: { GH_TOKEN: ${{ github.token }} }
        run: |
          $tag = "${{ github.ref_name }}"; if ($tag -notmatch "^v\d") { $tag = "v0.1.0" }
          
          # Create release if it doesn't exist
          if (!(gh release view $tag 2>$null)) {
            Write-Host "Creating new release $tag"
            gh release create $tag --title "Release $tag" --generate-notes
          }
          
          # Upload assets
          $assets = Get-ChildItem out -File | Select-Object -ExpandProperty FullName
          if ($assets.Count -gt 0) {
            Write-Host "Uploading assets: $($assets -join ', ')"
            gh release upload $tag $assets --clobber
          } else {
            Write-Error "No artifacts found to upload"
            exit 1
          }
